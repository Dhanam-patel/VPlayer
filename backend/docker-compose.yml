  postgres:
    image: pgvector/pgvector:pg17
    container_name: vplayer-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vplayer
    ports:
      - "5432:5432"
    volumes:
      - postgres_vplayer:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vplayer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_vplayer:

